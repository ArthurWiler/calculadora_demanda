        for (const tp of tipos) {
          if (!redeMono && tp === "bi" && demanda > 16) continue;

      // Funcoes de calculo
      function calcA_res(kw) {
        if (kw <= 0) return { d: 0, f: 0 };
        const x =
          TABELA_10.find((r) => kw > r.min && kw <= r.max) || TABELA_10[10];
        return { d: kw * x.fator, f: x.fator };
      }
      function calcA_nr(kva, ci) {
        if (kva <= 0 || ci < 0) return { d: 0, f: "-" };
        const c = TABELA_11[ci];
        if (!c) return { d: 0, f: "-" };
        if (c.lim === Infinity) return { d: kva * c.fp, f: c.fp };
        return {
          d: Math.min(kva, c.lim) * c.fp + Math.max(0, kva - c.lim) * c.fe,
          f: `${c.fp}/${c.fe}`,
        };
      }
      function calcBsg(items, sg) {
        const tot = items.reduce((s, i) => s + i.q, 0),
          kw = items.reduce((s, i) => s + i.q * i.w, 0) / 1000;
        if (!tot || kw <= 0) return { kw: 0, f: 0, d: 0 };
        if (sg === "b3") {
          const n = Math.min(tot, 12),
            pm = kw / tot,
            e = TABELA_12.find((x) => x.n === n) || TABELA_12[11],
            f = pm <= 3.5 ? e.a : e.b;
          return { kw, f, d: kw * f };
        }
        const f = getFt13(tot);
        return { kw, f, d: kw * f };
      }

        );

        const ilKW = useMemo(
          () => byG("il").reduce((s, x) => s + x.q * x.w, 0) / 1000,

        );
        const rA = useMemo(
          () => (tipoA === "res" ? calcA_res(ilKW) : calcA_nr(ilKW, catA)),
          [ilKW, tipoA, catA],
        );

        const rB = useMemo(() => {
          const r = (g) =>
            calcBsg(
              byG(g).map((x) => ({ q: x.q, w: x.w })),
              g,
            );
          const b1 = r("b1"),
            b2 = r("b2"),
            b3 = r("b3"),
            b4 = r("b4"),
            b5 = r("b5");
          return {
            b1,
            b2,
            b3,
            b4,
            b5,
            total: b1.d + b2.d + b3.d + b4.d + b5.d,
          };
        }, [byG]);

        const rC = useMemo(() => {
          const items = CAT.map((c, i) => ({ ...c, q: qtds[i], i })).filter(
            (x) => x.g === "c" && x.q > 0,
          );
          const norm = items.filter((x) => !cflags[x.i]),
            cent = items.filter((x) => cflags[x.i]);
          const tn = norm.reduce((s, x) => s + x.q, 0),
            kn = norm.reduce((s, x) => s + x.q * x.w, 0) / 1000,
            kc = cent.reduce((s, x) => s + x.q * x.w, 0) / 1000;
          const fn = getFt13(tn);
          return { d: kn * fn + kc, kw: kn + kc, fn };
        }, [qtds, cflags]);

        const rD = useMemo(() => {
          const ms = mots.filter((m) => m.q > 0 && m.cv > 0),
            tg = ms.reduce((s, m) => s + m.q, 0);
          let d = 0;
          const det = ms.map((m) => {
            const tb = m.tp === "m" ? T14 : T15,
              e = tb.find((x) => Math.abs(x.cv - m.cv) < 0.001);
            if (!e) return { ...m, dkva: 0 };
            let ck;
            if (tg === 1) ck = "c1";
            else if (tg === 2) ck = "c2";
            else if (tg <= 5) ck = "c3";
            else ck = "c4";
            const v = e[ck] === null ? e.c1 : e[ck];
            const dd = v * m.q;
            d += dd;
            return { ...m, dkva: dd };
          });
          return { d, tg, det };
        }, [mots]);

          ex.sort((a, b) => b.p - a.p);
          let d = 0;
          const det = ex.map((x, i) => {
            const f = i === 0 ? 1 : i === 1 ? 0.7 : i === 2 ? 0.4 : 0.3;
            const dd = x.p * f;
            d += dd;
            return { ...x, f, d: dd };

          return { d, det };

            const f = i === 0 ? 1 : 0.1;

                        style={{ width: 70 }}
                      />
                    </td>
                    <td
                      className="py-1 px-2"
                      style={{ borderBottom: `1px solid ${th.bd}20` }}
                    >
                      <Inp
                        type="number"
                        value={s.q || ""}
                        onChange={(e) =>
                          setSols((p) =>
                            p.map((x, j) =>
                              j === i
                                ? { ...x, q: parseInt(e.target.value) || 0 }
                                : x,
                            ),
                          )
                        }
                        style={{ width: 45 }}
                      />
                    </td>
                    <td
                      className="py-1 px-2"
                      style={{ borderBottom: `1px solid ${th.bd}20` }}
                    >
                      <input
                        type="checkbox"
                        checked={!!s.vv}
                        onChange={() =>
                          setSols((p) =>
                            p.map((x, j) =>
                              j === i ? { ...x, vv: !x.vv } : x,
                            ),
                          )
                        }
                      />
                    </td>
                    <td
                      className="py-1 px-1"
                      style={{ borderBottom: `1px solid ${th.bd}20` }}
                    >
                      <button
                        onClick={() =>
                          setSols((p) => p.filter((_, j) => j !== i))
                        }
                        style={{ color: th.rd }}
                      >
                        X
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            <Bt
              sm
              onClick={() =>
                setSols((p) => [
                  ...p,
                  { id: uid(), desc: "", w: 0, q: 1, vv: false },
                ])
              }
            >
              + Equipamento
            </Bt>
            {rE.det.length > 0 && (
              <div className="mt-3">
                {rE.det.map((d, i) => (
                  <div key={i} className="text-xs" style={{ color: th.tx }}>
                    #{i + 1} {d.desc || "-"} {d.vv ? "(V-v x2) " : ""}
                    {fmt(d.p)}kVA x{(d.f * 100).toFixed(0)}% ={" "}
                    <b style={{ color: th.ac }}>{fmt(d.d)}kVA</b>
                  </div>
                ))}
                <div
                  className="flex justify-between items-center p-2 rounded-lg mt-2"
                  style={{ background: th.abg, border: `1px solid ${th.ac}30` }}
                >
                  <b className="text-xs" style={{ color: th.tx }}>
                    Demanda "e"
                  </b>
                  <b style={{ color: th.ac }}>{fmt(rE.d)} kVA</b>
                </div>
              </div>
            )}
          </Cd>
        );

        const renderRes = () => {
          const gs = [
            { k: "a", l: "Iluminacao e tomadas", v: rA.d },
            { k: "b", l: "Aparelhos e aquecimento", v: rB.total },
            { k: "c", l: "Condicionadores de ar", v: rC.d },
            { k: "d", l: "Motores eletricos", v: rD.d },
            { k: "e", l: "Soldas/transformadores", v: rE.d },
            { k: "f", l: "Raios-X", v: rF.d },
          ];
          return (
            <div>
              <Cd>
                <div className="text-center mb-5">
                  <p
                    className="text-xs uppercase tracking-widest mb-1"
                    style={{ color: th.mt }}
                  >
                    Demanda total da edificacao
                  </p>
                  <div
                    className="font-mono"
                    style={{
                      fontSize: 42,
                      fontWeight: 900,
                      color: th.ac,
                      lineHeight: 1.1,
                    }}
                  >
                    {fmt(D)}
                    <span
                      className="text-lg font-semibold ml-2"
                      style={{ color: th.mt }}
                    >
                      kVA
                    </span>
                  </div>
                </div>
                <div
                  className="rounded-xl overflow-hidden"
                  style={{ border: `1px solid ${th.bd}` }}
                >
                  {gs.map((g, i) => (
                    <div
                      key={g.k}
                      className="flex items-center justify-between px-3 py-2.5"
                      style={{
                        borderBottom: i < 5 ? `1px solid ${th.bd}` : "none",
                        background: i % 2 === 0 ? th.inp : "transparent",
                      }}
                    >
                      <div className="flex items-center gap-2">
                        <Bg>{g.k}</Bg>
                        <span className="text-xs" style={{ color: th.tx }}>
                          {g.l}
                        </span>
                      </div>
                      <span
                        className="font-mono font-bold text-xs"
                        style={{ color: g.v > 0 ? th.ac : th.mt }}
                      >
                        {fmt(g.v)} kVA
                      </span>
                    </div>
                  ))}
                  <div
                    className="flex items-center justify-between px-3 py-3"
                    style={{ background: th.ac }}
                  >
                    <b className="text-xs text-white">
                      D = a + b + c + d + e + f
                    </b>
                    <span className="font-mono font-black text-base text-white">
                      {fmt(D)} kVA
                    </span>
                  </div>
                </div>
                <div className="flex gap-2 justify-center mt-4 flex-wrap">
                  <Bt v="a" onClick={copyR}>
                    {cp ? "Copiado!" : "Copiar resultado"}
                  </Bt>
                  <Bt onClick={clear}>Limpar tudo</Bt>
                </div>
              </Cd>
              {D > 0 && (
                <Cd
                  title="Disjuntor Recomendado"
                  sub={`Rede de MT: ${redeMT === "mono" ? "Monofasica (120/240V)" : "Trifasica (127/220V)"} | Demanda: ${fmt(D)} kVA`}
                >
                  {disjOpcoes.length > 0 ? (
                    <div>
                      {disjOpcoes.map((dj, i) => (
                        <div
                          key={i}
                          className="flex items-center justify-between px-3 py-2.5 rounded-lg mb-2"
                          style={{
                            background: i === 0 ? th.ac + "18" : th.abg,
                            border: `1px solid ${i === 0 ? th.ac : th.bd}${i === 0 ? "40" : "30"}`,
                          }}
                        >
                          <div className="flex items-center gap-2">
                            {i === 0 && (
                              <span
                                className="text-xs font-bold px-1.5 py-0.5 rounded"
                                style={{ background: th.ac, color: "#fff" }}
                              >
                                IDEAL
                              </span>
                            )}
                            {i > 0 && (
                              <span
                                className="text-xs px-1.5 py-0.5 rounded"
                                style={{ background: th.bd, color: th.mt }}
                              >
                                Alternativa
                              </span>
                            )}
                            <span
                              className="text-sm font-bold"
                              style={{ color: th.tx }}
                            >
                              {dj.fx}
                            </span>
                          </div>
                          <span
                            className="text-xs font-mono"
                            style={{ color: th.mt }}
                          >
                            ate {fmt(dj.d)} kVA
                          </span>
                        </div>
                      ))}
                      {redeMT === "tri" && D > 16 && (
                        <p className="text-xs mt-1" style={{ color: th.ac }}>
                          Rede trifasica com demanda acima de 16 kVA:
                          disjuntores bipolares desconsiderados.
                        </p>
                      )}
                    </div>
                  ) : (
                    <p className="text-xs" style={{ color: th.rd }}>
                      Nenhum disjuntor padrao atende a demanda calculada de{" "}
                      {fmt(D)} kVA. Consultar engenheiro responsavel.
                    </p>
                  )}
                </Cd>
              )}
              <Cd title="Observacoes normativas">
                <div className="text-xs space-y-1" style={{ color: th.mt }}>
                  <p>
                    Grupo "a" residencial: Tabela 10. Nao residencial: Tabela
                    11.
                  </p>
                  <p>
                    Subgrupos b1/b2/b4/b5: Tabela 13. b3 (fornos/fogoes): Tabela
                    12.
                  </p>
                  <p>
                    AC central: fator 100%. Motores: coluna varia pelo total
                    geral.
                  </p>
                  <p>
                    Grupo "e": V-v invertida dobra potencia. kW = kVA (fp
                    unitario) p/ aquecimento.
                  </p>
                  <p style={{ color: th.ac }}>
                    Ferramenta de apoio. Validar com profissional habilitado.
                  </p>
                </div>
              </Cd>
            </div>
          );
        };

        return (
          <div
            style={{
              background: th.bg,
              color: th.tx,
              minHeight: "100vh",
              fontFamily: "'DM Sans',system-ui,sans-serif",
            }}
          >
            <link
              href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap"
              rel="stylesheet"
            />
            <header style={{ background: th.hd }} className="sticky top-0 z-50">
              <div className="max-w-4xl mx-auto px-3 py-2.5 flex items-center justify-between">
                <div>
                  <h1 className="text-sm font-bold text-white">
                    Calculo de Demanda - CEMIG 5.1
                  </h1>
                  <p className="text-xs" style={{ color: "#9ca3af" }}>
                    Anexo B - D = a+b+c+d+e+f
                  </p>
                </div>
                <div className="flex items-center gap-2">
                  <div
                    className="hidden sm:flex items-center gap-1.5 px-2.5 py-1 rounded-lg"
                    style={{ background: `${th.ac}20` }}
                  >
                    <span className="text-xs" style={{ color: "#9ca3af" }}>
                      D=
                    </span>
                    <span
                      className="font-mono font-bold text-sm"
                      style={{ color: th.ac }}
                    >
                      {fmt(D)} kVA
                    </span>
                  </div>
                  <button
                    onClick={() => setDk(!dk)}
                    className="w-7 h-7 rounded-md flex items-center justify-center text-xs"
                    style={{
                      background: dk ? "#252836" : "#374151",
                      color: "#fff",
                    }}
                  >
                    {dk ? "\u2600" : "\u263E"}
                  </button>
                </div>
              </div>
              <div className="max-w-4xl mx-auto px-3">
                <div
                  className="flex gap-0.5 overflow-x-auto -mb-px"
                  style={{ scrollbarWidth: "none" }}
                >
                  {tbs.map((tb) => (
                    <button
                      key={tb.k}
                      onClick={() => setTab(tb.k)}
                      className="px-2.5 py-1.5 text-xs font-medium whitespace-nowrap rounded-t-md"
                      style={{
                        color: tab === tb.k ? th.ac : "#9ca3af",
                        background: tab === tb.k ? th.bg : "transparent",
                        borderBottom:
                          tab === tb.k
                            ? `2px solid ${th.ac}`
                            : "2px solid transparent",
                      }}
                    >
                      {tb.l}
                    </button>
                  ))}
                </div>
              </div>
            </header>
            <main className="max-w-4xl mx-auto px-3 py-4 pb-20">
              <div
                className="rounded-lg p-2.5 mb-4"
                style={{
                  background: `${th.ac}10`,
                  border: `1px solid ${th.ac}25`,
                }}
              >
                <p className="text-xs" style={{ color: th.ac }}>
                  Ferramenta de apoio tecnico. Resultados devem ser validados
                  por profissional habilitado.
                </p>
              </div>
              {tab === "cat" && renderCat()}
              {tab === "cfg" && renderCfg()}
              {tab === "mot" && renderMot()}
              {tab === "sol" && renderSol()}
              {tab === "res" && renderRes()}
            </main>
            <div
              className="sm:hidden fixed bottom-0 left-0 right-0 px-3 py-2 z-50 flex items-center justify-between"
              style={{ background: th.hd, borderTop: `1px solid ${th.bd}` }}
            >
              <span className="text-xs text-white">Demanda total</span>
              <span className="font-mono font-bold" style={{ color: th.ac }}>
                {fmt(D)} kVA
              </span>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
